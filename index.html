<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#fdfafc">
    <link rel="manifest" href="manifest.json">
    <title>Life Planner</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💕</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Great+Vibes&display=swap" rel="stylesheet">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="app-global-bg" style="position: fixed; top: -5%; left: -5%; width: 110%; height: 110%; z-index: -10; background-size: cover; background-position: center; opacity: 0.8; transition: background-image 0.5s ease;"></div>

    <div id="module-context-menu" class="context-menu">
        <div style="font-size: 0.75em; padding: 5px 15px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; font-weight:600; margin-bottom:5px;">Personalizar</div>
        <button onclick="ctxChangeCover()">📷 Cambiar Portada</button>
        <button onclick="ctxChangeIcon()">✧ Cambiar Ícono</button>
        <div style="padding: 10px 15px; display: flex; flex-wrap: wrap; gap: 8px; justify-content:center; border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); margin: 5px 0;">
            <div class="color-dot" style="background:var(--color-p1);" onclick="ctxSetColor('var(--color-p1)')"></div>
            <div class="color-dot" style="background:var(--color-p2);" onclick="ctxSetColor('var(--color-p2)')"></div>
            <div class="color-dot" style="background:var(--color-p3);" onclick="ctxSetColor('var(--color-p3)')"></div>
            <div class="color-dot" style="background:var(--color-p4);" onclick="ctxSetColor('var(--color-p4)')"></div>
            <div class="color-dot" style="background:var(--color-p5);" onclick="ctxSetColor('var(--color-p5)')"></div>
            <div class="color-dot" style="background:var(--color-p6);" onclick="ctxSetColor('var(--color-p6)')"></div>
        </div>
        <button onclick="toggleArchiveModule(window.contextTarget.cat, window.contextTarget.subcat)">📦 Archivar/Desarchivar</button>
        <button onclick="ctxDelete()" style="color:#ef4444; font-weight:600;">🗑️ Eliminar Módulo</button>
    </div>

    <button class="fab" onclick="openTaskModal()">+</button>

    <div class="modal-overlay" id="taskModal">
        <div class="modal" style="padding: 25px; max-width: 500px;">
            <span class="close-modal" onclick="closeTaskModal()">×</span>
            
            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
                <span style="font-size: 1.4em;">✨</span>
                <h2 id="modal-title" style="font-size: 1.3em; margin: 0; border: none; padding: 0;">Nuevo Registro</h2>
            </div>

            <select id="m-type" onchange="onTypeChange()" style="margin-bottom: 15px; height: 38px;">
                <option value="task">Tarea</option>
                <option value="event">Evento / Clase</option>
                <option value="birthday">Cumpleaños</option>
                <option value="routine">Rutina</option>
                <option value="product">Wishlist</option>
            </select>

            <input type="text" id="m-title" placeholder="Título del registro..." required style="font-size: 1.15em; border:none; border-bottom: 2px solid var(--border-color); background: transparent; padding: 10px 0; margin-bottom: 20px; border-radius: 0; width: 100%;">

            <label style="font-size:0.7em; color:#999; text-transform: uppercase; font-weight: 700; display: block; margin-bottom: 10px;">1. Ámbito</label>
            <div id="category-pill-container" style="display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px;"></div>

            <div id="subcategory-section" style="display: none; margin-bottom: 20px;">
                <label style="font-size:0.7em; color:#999; text-transform: uppercase; font-weight: 700; display: block; margin-bottom: 10px;">2. Módulo</label>
                <div id="subcategory-pill-container" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
            </div>

            <select id="m-category" style="display:none;"></select>
            <select id="m-subcategory" style="display:none;"></select>

            <div class="quick-date-pills" style="display:flex; gap:8px; margin-bottom:12px; overflow-x:auto;">
                <button type="button" class="tag-toggle" onclick="setQuickDate('today')">Hoy</button>
                <button type="button" class="tag-toggle" onclick="setQuickDate('tomorrow')">Mañana</button>
                <button type="button" class="tag-toggle" onclick="setQuickDate('next-week')">Próx. Semana</button>
            </div>
            
            <div style="display:flex; gap:10px; margin-bottom: 15px;">
                <div style="flex:1;"><input type="date" id="m-date" style="height: 40px;"></div>
                <div style="flex:1;"><input type="time" id="m-time" style="height: 40px;"></div>
            </div>

            <div class="checkbox-container" style="display:flex; flex-wrap:wrap; gap:15px; margin-bottom: 10px;">
                <label style="display:flex; align-items:center; gap:8px;"><input type="checkbox" id="m-recurring" onchange="toggleRecurrence()"> <span>Se repite</span></label>
                <label style="display:flex; align-items:center; gap:8px;"><input type="checkbox" id="m-my-day"> <span>☀️ Mi Día</span></label>
            </div>

            <select id="m-recurrence-type" style="display:none; margin-bottom:15px;" onchange="toggleTaskCustomFields()"><option value="daily">Diario</option><option value="weekly">Semanal</option><option value="monthly">Mensual</option><option value="yearly">Anual</option></select>

            <div id="subcategory-custom-fields" style="margin-top: 10px;"></div>

            <div style="margin-top: 15px; border-top: 1px dashed var(--border-color); padding-top: 15px;">
                <label style="font-size:0.75em; color:var(--accent); font-weight:700; text-transform:uppercase;">Subtareas / Pasos</label>
                <div id="m-subtasks-list" style="display:flex; flex-direction:column; gap:5px; margin: 10px 0;"></div>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="m-new-subtask" placeholder="+ Agregar paso..." style="flex:1; padding:8px; border:1px solid var(--border-color); border-radius:6px;">
                    <button type="button" class="add-small-btn" onclick="addSubtaskFromModal()">+</button>
                </div>
            </div>

            <div style="font-size: 0.75em; color: #999; margin-top: 15px; font-weight: 700; text-transform: uppercase;">Prioridad</div>
            <div class="priority-group" style="margin-top: 10px;">
                <button class="prio-btn none" onclick="setModalPriority('none')" id="btn-prio-none"><span class="prio-indicator none"></span>-</button>
                <button class="prio-btn low" onclick="setModalPriority('low')" id="btn-prio-low"><span class="prio-indicator low"></span>Baja</button>
                <button class="prio-btn med" onclick="setModalPriority('medium')" id="btn-prio-medium"><span class="prio-indicator med"></span>Media</button>
                <button class="prio-btn high" onclick="setModalPriority('high')" id="btn-prio-high"><span class="prio-indicator high"></span>Alta</button>
            </div>

            <textarea id="m-notes" placeholder="Notas, enlaces..." rows="2" style="margin-top: 15px;"></textarea>
            <button class="modal-btn" onclick="saveTask()" style="margin-top: 20px;">Guardar Registro</button>
        </div>
    </div>

    <div class="modal-overlay" id="taskDetailsModal">
        <div class="modal">
            <span class="close-modal" onclick="closeTaskDetailsModal()">×</span>
            <h2 id="task-details-title" style="color: var(--accent); font-size: 1.8em; margin-bottom: 20px;"></h2>
            <div style="margin-bottom: 20px;">
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                    <span id="task-details-scope" style="font-size: 1.2em; font-weight: 600;"></span>
                </div>
                <div id="task-details-schedule" style="font-size: 0.9em; color: #888;"></div>
            </div>
            <div id="task-details-notes" style="margin-bottom: 30px; line-height: 1.6; font-size: 0.95em;"></div>
            <div style="display: flex; gap: 15px; justify-content: flex-end;">
                <button class="modal-btn" onclick="editTaskFromDetails()" style="background: var(--accent); flex: 1;">Editar</button>
                <button class="modal-btn" onclick="deleteTaskFromDetails()" style="background: #ef4444; flex: 1;">Eliminar</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="mealSelectorModal" style="display:none;">
        <div class="modal" style="max-width: 420px;">
            <span class="close-modal" onclick="closeMealSelectorModal()">×</span>
            <h2 id="meal-selector-title">Seleccionar receta</h2>
            <select id="meal-selector-select" style="margin-top: 15px;"></select>
            <button class="modal-btn" onclick="saveMealSelection()" style="margin-top:20px;">Guardar</button>
        </div>
    </div>

    <div class="modal-overlay" id="confirmModalOverlay">
        <div class="modal">
            <h2>Confirmar acción</h2>
            <p class="confirm-message">¿Estás segura de que quieres continuar?</p>
            <div class="confirm-actions">
                <button class="confirm-btn yes-btn" onclick="confirmModalYes()">Sí, eliminar</button>
                <button class="confirm-btn cancel-btn" onclick="closeConfirmModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="habitModal">
        <div class="modal">
            <span class="close-modal" onclick="closeHabitModal()">×</span>
            <h2>Añadir Hábito</h2>
            <input type="text" id="h-title" placeholder="Nombre del hábito..." required>
            <div style="display:flex; gap:10px; margin-top: 15px;">
                <select id="h-category">
                    <option value="Bodycare">🌸 Bodycare</option>
                    <option value="Fitness">💪 Fitness</option>
                    <option value="Mind">🧠 Mind & Espiritualidad</option>
                </select>
                <input type="text" id="h-group" placeholder="Sub-grupo">
            </div>
            <select id="h-freq" onchange="toggleHabitCustomFields()" style="margin-top: 15px;">
                <option value="daily">Diario</option>
                <option value="weekly">Semanal</option>
                <option value="monthly">Mensual</option>
                <option value="personalizado">Personalizado</option>
            </select>
            <button class="modal-btn" onclick="saveHabit()" style="margin-top: 25px;">Guardar Hábito</button>
        </div>
    </div>

    <div class="modal-overlay" id="categoryGalleryModal">
        <div class="modal" style="max-width: 700px; padding: 30px;">
            <span class="close-modal" onclick="closeCategoryGalleryModal()">×</span>
            <h2 id="gallery-modal-title" style="margin-bottom: 20px; font-size: 1.8em;">Módulos</h2>
            <div id="gallery-modal-content" class="category-menu-list"></div>
        </div>
    </div>

    <div id="dashboard-container">
        <div class="dashboard-grid">
           <section class="widget-card">
                <div style="display: flex; flex-direction: column; justify-content: space-between; flex: 1;">
                    <iframe src="https://indify.co/widgets/live/clock/CMvVQk93BJ649rAaGbP8" style="width: 100%; height: 130px; border: none; overflow: hidden; border-radius: 8px;"></iframe>
                    <div id="lyric-quote" style="padding: 0 10px; margin-bottom: 10px;"></div>
                </div>
            </section>
            
            <section class="widget-card span-5">
                <div class="widget-header"><h3 class="widget-title">Mis ámbitos</h3></div>
                <div id="dashboard-modules-scroll"></div>
            </section>

            <section class="widget-card span-6">
                <div class="calendar-controls" style="justify-content: center;">
                    <div class="widget-row" style="gap: 15px;">
                        <button class="widget-action-btn" onclick="prevMonth()" style="background:none; border:none; font-size:1.2em;">❮</button>
                        <span class="month-label month-display"></span>
                        <button class="widget-action-btn" onclick="nextMonth()" style="background:none; border:none; font-size:1.2em;">❯</button>
                    </div>
                </div>
                <div id="cal-dashboard" class="calendar-grid"></div>
            </section>

            <section class="widget-card span-3">
                <div class="widget-header">
                    <h3 class="widget-title">Mis Tareas</h3>
                    <div style="display:flex; gap:5px;">
                        <button class="widget-action-btn" onclick="openHistoryModal()">🕒</button>
                        <button class="widget-action-btn" onclick="openFocusKanbanModal()">📋</button>
                        <button class="widget-action-btn" onclick="openTaskModal('task')">+</button>
                    </div>
                </div>
                <div id="dashboard-tasks-list" class="task-list-scroll"></div>
            </section>

            <section class="widget-card span-3">
                <div class="widget-header"><h3 class="widget-title">Próximos Eventos</h3><button class="widget-action-btn" onclick="openTaskModal('event')">+</button></div>
                <div id="dashboard-events-list"></div>
            </section>

            <section class="widget-card span-6">
                <div class="widget-header"><h3 class="widget-title">Hábitos Diarios</h3><button class="widget-action-btn" onclick="openHabitModal()">+</button></div>
                <div id="dashboard-habits-list" class="habit-list"></div>
            </section>

            <section class="widget-card span-6">
                <div class="widget-header"><h3 class="widget-title">Menú Semanal</h3></div>
                <div id="meal-calendar" class="meal-grid"></div>
            </section>
        </div>
    </div>

    <div id="subpage-modal" class="modal-overlay">
        <div class="modal-content-wrapper">
            <span class="close-modal" onclick="closeSubpageModal()">×</span>
            <div id="subpage-modal-body">
                <img src="" class="page-cover" id="sp-cover">
                <div class="page-icon-wrapper"><div class="page-icon" id="sp-icon" onclick="changeCover()">✧</div></div>
                <div style="padding: 20px 50px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;">
                        <h2 id="sp-subcat-title" style="margin:0; font-family: 'Playfair Display', serif; font-size: 2.2em;"></h2>
                        <button class="add-small-btn" onclick="openTaskModal('task', null, currentParentView.replace('mod-', ''), currentSubcatOpened)">+ Nueva Tarea / Evento</button>
                    </div>
                    <div id="sp-dynamic-content-area"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
